name: Update Hobo/McNeil Analog Forecast

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are best-effort, not exact-to-the-minute. Every 15 min is reasonable.
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live V3 forecast
        run: |
          python src/live_forecast_v3.py

      - name: Build browser analog database for manual what-if mode
        run: |
          python src/build_web_analog_db.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/output/current_forecast.json docs/output/current_forecast.csv docs/output/current_analogs.csv docs/data/event_snapshots_web.json
          git commit -m "Update live Hobo/McNeil analog forecast" || echo "No changes to commit"
          git push
